<style>

.err{color:#dc2626;font-size:13px;margin-top:10px;display:none}

function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function dec(){
try{document.getElementById("err").style.display="none";
const pw=document.getElementById("pw").value,
enc=new TextEncoder(),
kb=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveBits","deriveKey"]),
key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(SALT),iterations:100000,hash:"SHA-256"},kb,{name:"AES-GCM",length:256},false,["decrypt"]),
pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(IV)},key,b64(CT)),
html=new TextDecoder().decode(pt);
document.open();document.write(html);document.close();
}catch(e){document.getElementById("err").style.display="block"}}
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")dec()});
</script></body></html>
